<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DockeRoom</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="site-header">
    <h1>Dockeroom</h1>
    <p>Consulte a disponibilidade ao reservar uma sala.</p>
  </header>

  <main class="layout">
    <section id="auth-panel" class="panel auth-panel">
      <div class="tabs" role="tablist">
        <button type="button" class="tab is-active" data-tab="login" role="tab" aria-selected="true">
          Entrar
        </button>
        <button type="button" class="tab" data-tab="cadastro" role="tab" aria-selected="false">
          Criar conta
        </button>
      </div>

      <form id="login-form" class="tab-content is-active" data-tab-content="login">
        <div class="field">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" required />
        </div>

        <div class="field">
          <label for="login-senha">Senha</label>
          <input type="password" id="login-senha" required />
        </div>

        <div class="actions">
          <button type="submit" class="btn-primary">Entrar</button>
        </div>

        <p id="login-mensagem" class="mensagem" aria-live="polite"></p>
      </form>

      <form id="cadastro-form" class="tab-content" data-tab-content="cadastro">
        <div class="field">
          <label for="cadastro-nome">Nome</label>
          <input type="text" id="cadastro-nome" required />
        </div>

        <div class="field">
          <label for="cadastro-email">Email</label>
          <input type="email" id="cadastro-email" required />
        </div>

        <div class="field">
          <label for="cadastro-senha">Senha</label>
          <input type="password" id="cadastro-senha" minlength="6" required />
        </div>

        <div class="actions">
          <button type="submit" class="btn-primary">Criar conta</button>
        </div>

        <p id="cadastro-mensagem" class="mensagem" aria-live="polite"></p>
      </form>
    </section>

    <section id="usuario-logado-panel" class="panel oculto">
      <div class="sessao-info">
        <p id="usuario-logado-info"></p>
        <button type="button" id="logout-btn" class="btn-secondary">Sair</button>
      </div>
    </section>

    <section class="panel salas-panel">
      <h2>Salas disponíveis</h2>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Sala</th>
              <th>Capacidade</th>
              <th>Recursos</th>
              <th>Próximos horários ocupados</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="salas-tabela"></tbody>
        </table>
      </div>
    </section>

    <section id="reserva-panel" class="panel oculto">
      <h2>Nova reserva</h2>

      <form id="reserva-form">
        <input type="hidden" id="reserva-sala-id" />

        <p id="reserva-sala-nome" class="destaque"></p>

        <div class="field">
          <label for="reserva-titulo">Título da reunião</label>
          <input type="text" id="reserva-titulo" required />
        </div>

        <div class="field-row">
          <div class="field">
            <label for="reserva-inicio">Início</label>
            <input type="datetime-local" id="reserva-inicio" required />
          </div>

          <div class="field">
            <label for="reserva-fim">Fim</label>
            <input type="datetime-local" id="reserva-fim" required />
          </div>
        </div>

        <div class="actions">
          <button type="submit" class="btn-primary">Confirmar reserva</button>
          <button type="button" id="cancelar-reserva-btn" class="btn-secondary">Cancelar</button>
        </div>

        <p id="reserva-mensagem" class="mensagem" aria-live="polite"></p>
      </form>
    </section>

    <section id="admin-panel" class="panel oculto">
      <h2>Gerenciar salas</h2>

      <form id="sala-form">
        <input type="hidden" id="sala-id" />

        <div class="field-row">
          <div class="field">
            <label for="sala-nome">Nome</label>
            <input type="text" id="sala-nome" required />
          </div>

          <div class="field">
            <label for="sala-capacidade">Capacidade</label>
            <input type="number" id="sala-capacidade" min="1" required />
          </div>
        </div>

        <div class="field">
          <label for="sala-descricao">Descrição</label>
          <input type="text" id="sala-descricao" />
        </div>

        <div class="field">
          <label for="sala-recursos">Recursos</label>
          <input type="text" id="sala-recursos" placeholder="Ex: Projetor, TV, quadro branco" />
        </div>

        <div class="actions">
          <button type="submit" class="btn-primary" id="sala-submit-btn">Criar sala</button>
          <button type="button" id="sala-cancelar-btn" class="btn-secondary oculto">Cancelar edição</button>
        </div>

        <p id="sala-mensagem" class="mensagem" aria-live="polite"></p>
      </form>

      <div class="table-wrap admin-salas-tabela">
        <table>
          <thead>
            <tr>
              <th>Sala</th>
              <th>Capacidade</th>
              <th>Recursos</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="admin-salas-tabela"></tbody>
        </table>
      </div>

      <h2 class="admin-secao-titulo">Reservas pendentes</h2>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Sala</th>
              <th>Responsável</th>
              <th>Título</th>
              <th>Horário</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="pendentes-tabela"></tbody>
        </table>
      </div>

      <p id="pendentes-vazio" class="mensagem oculto">Nenhuma reserva pendente.</p>
    </section>
  </main>

  <footer class="site-footer">
    <small>Sistema de reserva de salas</small>
  </footer>

  <script src="./app.js"></script>
</body>
</html>
